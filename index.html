<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vibegram</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="h-[100dvh] w-[100dvw] flex overflow-hidden bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors">

    <div id="auth-screen" class="w-full h-full flex items-center justify-center bg-gradient-to-br from-blue-500 to-indigo-600 dark:from-blue-900 dark:to-indigo-950 z-50 absolute inset-0 px-4">
        <div class="bg-white dark:bg-gray-900 p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
            <div class="w-24 h-24 mx-auto mb-4 rounded-3xl overflow-hidden shadow-lg border-2 border-white/20 icon-pop-anim cursor-pointer">
                <img src="./image/Gemini_Generated_Image_fpoqbdfpoqbdfpoq (1).png" alt="Vibegram Logo" class="w-full h-full object-cover">
            </div>
            <h1 class="text-4xl font-bold text-gray-800 dark:text-gray-100 mb-2">Vibegram</h1>
            <p class="text-gray-500 dark:text-gray-400 mb-8 text-sm">Подключайся и общайся</p>
            <input type="text" id="auth-nick" placeholder="Твое имя" class="w-full mb-4 p-4 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl outline-none focus:border-blue-500 transition-colors text-gray-900 dark:text-gray-100">
            <input type="password" id="auth-pass" placeholder="Пароль (от 6 символов)" class="w-full mb-6 p-4 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl outline-none focus:border-blue-500 transition-colors text-gray-900 dark:text-gray-100">
            <button onclick="login()" class="w-full bg-blue-600 text-white font-semibold p-4 rounded-xl mb-3 hover:bg-blue-700 transition-colors shadow-md">Войти</button>
            <button onclick="register()" class="w-full bg-white dark:bg-gray-800 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-900/50 font-semibold p-4 rounded-xl hover:bg-blue-50 dark:hover:bg-gray-700 transition-colors">Создать аккаунт</button>
            <p id="auth-error" class="text-red-500 mt-4 text-sm font-medium h-4 transition-all"></p>
        </div>
    </div>

    <div id="app-screen" class="w-full h-full flex hidden relative">
        
        <div id="sidebar" class="w-full md:w-[350px] bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col h-full absolute md:relative z-20 transition-transform duration-300">
            <div class="h-16 flex items-center justify-between px-4 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 shrink-0">
                <div class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 p-2 rounded-xl transition-colors w-full" onclick="openSettings()">
                    <div class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-indigo-500 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-md relative" id="my-avatar">
                        ?
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <span id="my-nickname" class="font-bold text-gray-800 dark:text-gray-100 block leading-tight truncate">Загрузка...</span>
                        <span class="text-xs text-gray-500 dark:text-gray-400">Мой профиль</span>
                    </div>
                </div>
                <div class="flex items-center">
                    <button onclick="openCreateGroup()" class="p-2 text-gray-500 dark:text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-full transition-colors shrink-0" title="Создать группу">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </button>
                    <button onclick="openCreateChannel()" class="p-2 text-gray-500 dark:text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-full transition-colors shrink-0" title="Создать канал">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"></path></svg>
                    </button>
                </div>
            </div>
            
            <div class="p-3 bg-white dark:bg-gray-900 shrink-0 relative shadow-sm z-10">
                <div class="flex bg-gray-100 dark:bg-gray-800 rounded-xl overflow-hidden focus-within:ring-2 ring-blue-500 transition-all">
                    <svg class="w-5 h-5 text-gray-400 dark:text-gray-500 ml-3 my-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="search-input" placeholder="Поиск людей..." class="w-full p-2.5 bg-transparent outline-none text-sm px-3 text-gray-900 dark:text-gray-100" oninput="searchUsers(this.value)">
                </div>
                <div id="search-results" class="hidden mt-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl absolute w-[calc(100%-24px)] z-50 max-h-64 overflow-y-auto"></div>
            </div>

            <div id="chats-list" class="flex-1 overflow-y-auto bg-white dark:bg-gray-900"></div>
        </div>

        <div id="chat-area" class="w-full flex-1 flex flex-col bg-slate-50 dark:bg-slate-900 chat-bg hidden md:flex absolute inset-0 md:relative z-10 h-full">
            <div class="h-16 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 flex items-center px-4 shadow-sm shrink-0 justify-between z-20">
                <div id="chat-header-container" class="flex items-center w-full p-1.5 rounded-xl transition-colors -ml-1.5" onclick="openChatInfo()">
                    <button onclick="event.stopPropagation(); closeChatMobile()" class="md:hidden mr-2 p-2 text-blue-500 hover:bg-blue-100 rounded-full">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <div id="chat-header-avatar" class="w-10 h-10 bg-gray-300 rounded-full hidden items-center justify-center text-white font-bold mr-3 shadow-sm relative"></div>
                    <div class="flex-1">
                        <h2 id="current-chat-name" class="font-bold text-lg text-gray-800 dark:text-gray-100 leading-tight">Выберите чат</h2>
                        <p id="current-chat-status" class="text-xs text-gray-500 dark:text-gray-400"></p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button id="audio-call-btn" onclick="startAudioCall()" class="hidden p-2 text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-full transition-colors" title="Аудиозвонок">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    </button>
                    <button id="video-call-btn" onclick="startVideoCall()" class="hidden p-2 text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-full transition-colors" title="Видеозвонок">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </button>
                </div>
            </div>

            <div id="messages-list" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 relative z-10 pb-20">
                <div class="flex h-full items-center justify-center">
                    <div class="bg-black/40 dark:bg-black/60 text-white px-5 py-2 rounded-full text-sm backdrop-blur-md shadow-lg">Выберите чат для начала общения</div>
                </div>
            </div>

            <div id="video-preview-container" class="hidden absolute inset-0 z-30 flex items-center justify-center bg-black/40 backdrop-blur-sm">
                <div class="relative w-64 h-64 sm:w-80 sm:h-80 rounded-full overflow-hidden border-4 border-blue-500 shadow-2xl bg-black">
                    <video id="video-preview" class="w-full h-full object-cover transform scale-x-[-1]" muted playsinline></video>
                </div>
            </div>

            <div id="bottom-controls" class="absolute bottom-0 left-0 w-full z-40 flex flex-col pointer-events-none">
                <div class="pointer-events-auto">
                    <div id="file-preview-area" class="hidden bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-t border-gray-200 dark:border-gray-800 p-3 flex items-center justify-between z-20">
                <div class="flex items-center gap-3 overflow-hidden flex-1 min-w-0">
                    <div id="file-preview-icon" class="bg-blue-100 dark:bg-blue-900/50 p-2.5 rounded-xl text-blue-600 dark:text-blue-400 shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div id="file-preview-name" class="text-sm font-semibold text-gray-700 dark:text-gray-200 truncate w-full">Файлы</div>
                        <div class="text-xs text-gray-500 dark:text-gray-400 format-size" id="file-preview-size"></div>
                    </div>
                </div>
                <button onclick="clearFile()" class="text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 p-2 rounded-full transition-colors shrink-0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="bg-gradient-to-t from-black/5 to-transparent dark:from-black/40 border-0 p-3 pt-6 shrink-0 z-40" id="input-area" style="display: none; position: relative; padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));">
                <div id="reply-preview" class="hidden flex items-center gap-2 mb-2 px-2 border-l-2 border-blue-500 ml-2">
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium text-blue-500 dark:text-blue-400" id="reply-preview-name">Name</div>
                        <div class="text-sm text-gray-500 dark:text-gray-400 truncate" id="reply-preview-text">Text</div>
                    </div>
                    <button onclick="cancelReply()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 p-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="flex items-end gap-2 bg-white dark:bg-gray-800 p-1.5 rounded-[24px] shadow-md border border-gray-200 dark:border-gray-700 focus-within:ring-2 ring-blue-500 transition-all min-h-[56px] relative z-40">
                    
                    <div id="recording-ui" class="hidden absolute inset-0 bg-white dark:bg-gray-800 z-10 flex items-center justify-between px-4 rounded-[24px]">
                        <button type="button" onclick="event.stopPropagation(); cancelRecording()" class="text-gray-400 hover:text-red-500 transition-colors flex items-center gap-1 text-sm font-medium">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            Отмена
                        </button>
                        <div class="flex items-center gap-3 text-red-500">
                            <div class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></div>
                            <span id="recording-time" class="font-mono text-[15px]">0:00</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button type="button" id="switch-camera-btn" onclick="event.stopPropagation(); switchCamera()" class="hidden bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 p-2 rounded-full hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors shadow-md">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            </button>
                            <button type="button" onclick="event.stopPropagation(); sendRecording()" class="bg-blue-500 text-white p-2 rounded-full hover:bg-blue-600 transition-colors shadow-md transform hover:scale-105 active:scale-95">
                                <svg class="w-5 h-5 ml-0.5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                            </button>
                        </div>
                    </div>

                    <div class="relative shrink-0 self-end" id="attach-container">
                        <button type="button" onclick="window.toggleAttachMenu(event)" id="attach-btn" class="text-gray-400 hover:text-blue-500 p-3 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                        </button>
                        <div id="attach-menu" class="hidden absolute bottom-full left-0 mb-2 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 overflow-hidden z-50 w-48 py-1">
                            <label class="w-full text-left px-4 py-3 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors flex items-center gap-3 cursor-pointer">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2 2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                Медиа
                                <input type="file" id="media-input" class="hidden" multiple accept="image/*,video/*" onchange="handleMediaSelect(event)">
                            </label>
                            <label class="w-full text-left px-4 py-3 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors flex items-center gap-3 cursor-pointer">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                Файл
                                <input type="file" id="file-input" class="hidden" multiple onchange="handleFileSelect(event)">
                            </label>
                            <button type="button" id="attach-poll-btn" onclick="openCreatePollModal()" class="w-full text-left px-4 py-3 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors flex items-center gap-3 hidden">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                                Опрос
                            </button>
                        </div>
                    </div>
                        <!-- Emoji Button -->
                        <button type="button" onclick="window.toggleEmojiMenu(event)" id="emoji-btn" class="text-gray-400 hover:text-blue-500 p-3 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors shrink-0">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </button>

                        <!-- Emoji Menu -->
                        <div id="emoji-menu" class="absolute bottom-full left-12 mb-2 hidden bg-white/95 dark:bg-gray-800/95 backdrop-blur-md rounded-2xl shadow-2xl border border-gray-100 dark:border-gray-700 w-72 p-3 z-50 h-64 overflow-y-auto custom-scrollbar">
                            <div class="grid grid-cols-6 gap-2" id="emoji-grid"></div>
                        </div>

                    <textarea id="message-input" rows="1" placeholder="Написать..." class="flex-1 min-w-0 max-h-32 py-[10px] min-h-[44px] outline-none resize-none bg-transparent text-gray-800 dark:text-gray-100 text-[15px] leading-[24px] self-center custom-scrollbar" oninput="handleInput()"></textarea>
                    
                    <button onclick="toggleRecording('voice')" id="mic-btn" class="text-gray-400 hover:text-blue-500 p-3 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors shrink-0 self-end">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                    </button>
                    
                    <button onclick="toggleRecording('video')" id="video-btn" class="text-gray-400 hover:text-blue-500 p-3 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors shrink-0 self-end">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>

                    <button onclick="generateAiImage()" id="ai-generate-btn" class="hidden bg-gradient-to-r from-purple-500 to-pink-500 text-white p-3.5 rounded-full shrink-0 hover:from-purple-600 hover:to-pink-600 transition-colors shadow-md transform hover:scale-105 active:scale-95 self-end mb-0.5 mr-0.5" title="Создать изображение">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </button>

                    <button onclick="sendMessage()" id="send-btn" class="hidden bg-blue-500 text-white p-3.5 rounded-full shrink-0 hover:bg-blue-600 transition-colors shadow-md transform hover:scale-105 active:scale-95 self-end mb-0.5 mr-0.5">
                        <svg class="w-5 h-5 ml-0.5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                    </button>
                </div>
            </div>
            </div>
            <script>
                // Dynamic padding to messages-list based on input-area height
                const bottomControls = document.getElementById('bottom-controls');
                const messagesList = document.getElementById('messages-list');
                if (bottomControls && messagesList) {
                    const observer = new ResizeObserver(entries => {
                        for (let entry of entries) {
                            const isAtBottom = messagesList.scrollHeight - messagesList.scrollTop - messagesList.clientHeight < 50;
                            messagesList.style.paddingBottom = (entry.contentRect.height + 16) + 'px';
                            if (isAtBottom) {
                                messagesList.scrollTop = messagesList.scrollHeight;
                            }
                        }
                    });
                    observer.observe(bottomControls);
                }
            </script>
        </div>
    </div>

    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm" onclick="closeModal(event)">
        <div id="modal-content" class="bg-white dark:bg-gray-900 rounded-3xl w-full max-w-md shadow-2xl modal-enter max-h-[90dvh] flex flex-col overflow-hidden relative" onclick="event.stopPropagation()">
        </div>
    </div>

    <div id="video-call-modal" class="hidden fixed inset-0 bg-gray-900 z-[100] flex flex-col">
        <div class="flex-1 relative bg-black flex items-center justify-center overflow-hidden">
            <video id="remote-video" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline></video>
            <audio id="remote-audio" autoplay playsinline></audio>
            
            <div class="text-white text-center z-10" id="call-avatar-container">
                <div class="w-24 h-24 bg-blue-500 rounded-full mx-auto mb-4 flex items-center justify-center text-4xl font-bold" id="call-avatar">U</div>
                <h2 class="text-2xl font-bold mb-2" id="call-name">User</h2>
                <p class="text-gray-400" id="call-status">Вызов...</p>
            </div>
            
            <div id="local-video-container" class="absolute bottom-8 right-8 w-32 h-48 bg-gray-800 rounded-xl border-2 border-gray-700 overflow-hidden z-20 shadow-2xl">
                <video id="local-video" class="w-full h-full object-cover" muted playsinline autoplay></video>
            </div>
        </div>
        <div class="h-24 bg-gray-900 flex items-center justify-center gap-4 sm:gap-6 pb-4 z-20">
            <button onclick="toggleCallAudio()" id="call-audio-btn" class="w-12 h-12 sm:w-14 sm:h-14 bg-gray-700 rounded-full flex items-center justify-center text-white hover:bg-gray-600 transition-colors">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            </button>
            <button onclick="toggleCallVideo()" id="call-video-btn" class="w-12 h-12 sm:w-14 sm:h-14 bg-gray-700 rounded-full flex items-center justify-center text-white hover:bg-gray-600 transition-colors">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
            </button>
            <button onclick="switchCallCamera()" id="call-switch-camera-btn" class="w-12 h-12 sm:w-14 sm:h-14 bg-gray-700 rounded-full flex items-center justify-center text-white hover:bg-gray-600 transition-colors">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
            <button onclick="endVideoCall()" class="w-12 h-12 sm:w-14 sm:h-14 bg-red-500 rounded-full flex items-center justify-center text-white hover:bg-red-600 transition-colors shadow-lg shadow-red-500/30">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z"></path></svg>
            </button>
        </div>
    </div>

    <div id="incoming-call-modal" class="hidden fixed inset-0 bg-black/80 z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-gray-900 rounded-3xl w-full max-w-sm p-8 shadow-2xl text-center border border-gray-800 modal-enter">
            <div class="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full mx-auto mb-4 flex items-center justify-center text-white text-4xl font-bold shadow-lg" id="incoming-call-avatar">U</div>
            <h3 class="text-2xl font-bold text-white mb-1" id="incoming-call-name">User</h3>
            <p class="text-gray-400 mb-8">Входящий видеозвонок...</p>
            <div class="flex items-center justify-center gap-6">
                <button id="reject-call-btn" class="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center text-white hover:bg-red-600 transition-colors shadow-lg shadow-red-500/30">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z"></path></svg>
                </button>
                <button id="accept-call-btn" class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-white hover:bg-green-600 transition-colors shadow-lg shadow-green-500/30 animate-pulse">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="create-poll-modal" class="hidden fixed inset-0 bg-black/50 z-[150] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                <h3 class="font-semibold text-gray-900 dark:text-white">Новый опрос</h3>
                <button onclick="closeCreatePollModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 p-1 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-4 overflow-y-auto flex-1 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Вопрос</label>
                    <input type="text" id="poll-question" placeholder="Задайте вопрос" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Варианты ответа</label>
                    <div id="poll-options-container" class="space-y-2">
                        <input type="text" class="poll-option-input w-full p-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Вариант 1">
                        <input type="text" class="poll-option-input w-full p-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Вариант 2">
                    </div>
                    <button type="button" onclick="addPollOption()" id="add-poll-option-btn" class="mt-2 text-blue-500 hover:text-blue-600 text-sm font-medium flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Добавить вариант
                    </button>
                </div>
                <div class="space-y-2 pt-2 border-t border-gray-100 dark:border-gray-700">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="poll-anonymous" class="rounded text-blue-500 focus:ring-blue-500 bg-gray-100 border-gray-300 dark:bg-gray-700 dark:border-gray-600" checked>
                        <span class="text-sm text-gray-700 dark:text-gray-300">Анонимное голосование</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="poll-multiple" class="rounded text-blue-500 focus:ring-blue-500 bg-gray-100 border-gray-300 dark:bg-gray-700 dark:border-gray-600">
                        <span class="text-sm text-gray-700 dark:text-gray-300">Выбор нескольких вариантов</span>
                    </label>
                </div>
            </div>
            <div class="p-4 border-t border-gray-100 dark:border-gray-700 flex justify-end gap-2 bg-gray-50 dark:bg-gray-800/50">
                <button onclick="closeCreatePollModal()" class="px-4 py-2 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition-colors font-medium">Отмена</button>
                <button id="submit-poll-btn" onclick="createPoll()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors font-medium shadow-sm">Создать</button>
            </div>
        </div>
    </div>

    <div id="poll-voters-modal" class="hidden fixed inset-0 bg-black/50 z-[160] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
            <div class="p-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                <h3 class="font-semibold text-gray-900 dark:text-white">Результаты</h3>
                <button onclick="closePollVotersModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 p-1 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="poll-voters-content" class="p-4 overflow-y-auto flex-1">
                <!-- Voters will be injected here -->
            </div>
        </div>
    </div>

    <div id="lightbox-modal" class="hidden fixed inset-0 bg-black/95 z-[200] flex flex-col items-center justify-center backdrop-blur-md transition-opacity" onclick="closeLightbox(event)">
        <button onclick="closeLightbox(event)" class="absolute top-4 right-4 text-white/70 hover:text-white p-2 bg-black/20 hover:bg-black/40 rounded-full transition-colors z-10">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <button id="lightbox-prev" onclick="lightboxPrev(event)" class="absolute left-4 top-1/2 -translate-y-1/2 text-white/70 hover:text-white p-3 bg-black/20 hover:bg-black/40 rounded-full transition-colors z-10 hidden">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <button id="lightbox-next" onclick="lightboxNext(event)" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/70 hover:text-white p-3 bg-black/20 hover:bg-black/40 rounded-full transition-colors z-10 hidden">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>
        <div id="lightbox-content" class="w-full h-full flex items-center justify-center p-4 max-w-5xl mx-auto" onclick="event.stopPropagation()">
            <!-- Content injected via JS -->
        </div>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
